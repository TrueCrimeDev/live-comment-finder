<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LCF Demo Feed</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #eee;
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 18px;
      }
      #feed {
        max-height: 60vh;
        overflow: auto;
        border: 1px solid #303030;
        border-radius: 8px;
        padding: 8px;
        list-style: none;
        margin: 12px 0;
      }
      .msg {
        padding: 6px;
        border-bottom: 1px solid #232323;
      }
      .who {
        color: #5b9fef;
        font-weight: 600;
        margin-right: 6px;
      }
      time {
        color: #707070;
        font-size: 11px;
        margin-left: 6px;
      }
      button {
        background: #202020;
        color: #eee;
        border: 1px solid #303030;
        border-radius: 6px;
        padding: 6px 12px;
        margin: 4px;
        cursor: pointer;
      }
      label {
        margin-left: 8px;
      }
      input {
        background: #202020;
        color: #eee;
        border: 1px solid #303030;
        border-radius: 6px;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Live Comment Finder — Demo Feed</h1>
    <div>
      <button id="start">Start</button>
      <button id="pause">Pause</button>
      <button id="burst">Burst 50</button>
      <button id="reset">Reset</button>
      <label>Interval <input id="interval" type="number" value="600" min="50" style="width: 70px" /> ms</label>
      <label>Max nodes <input id="maxnodes" type="number" value="40" min="5" style="width: 70px" /></label>
    </div>
    <ul id="feed" role="log" aria-label="Live demo comments"></ul>
    <p>Open the Live Comment Finder side panel, choose <strong>Select Comment Feed</strong>, click this list, then Start.</p>
    <script src="./feed.js"></script>
  </body>
</html>
